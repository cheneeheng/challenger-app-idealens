# Local dev: PostgreSQL only. Backend and frontend run on the host.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: idealens
      POSTGRES_PASSWORD: idealens
      POSTGRES_DB: idealens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idealens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
